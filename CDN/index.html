<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Demo</title>
  
  <!-- CSS BOOTSTRAP -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
  
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="#">Bootstrap Demo</a>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <div class="container my-5 p-4 bg-white rounded shadow">
    <h1 class="text-center mb-4">Bootstrap funcionando!</h1>
    
    <div class="row">
      <div class="col-md-6">
        <h3>Botões prontos:</h3>
        <button class="btn btn-primary mb-2">Primary</button>
        <button class="btn btn-success mb-2">Success</button>
        <button class="btn btn-danger mb-2">Danger</button>
      </div>
      
      <div class="col-md-6">
        <h3>Grid responsivo:</h3>
        <div class="row">
          <div class="col-6 bg-info text-white p-3 mb-2">Coluna 1</div>
          <div class="col-6 bg-warning text-white p-3 mb-2">Coluna 2</div>
        </div>
      </div>
    </div>

    <!-- Botão Modal -->
    <div class="text-center mt-5">
      <button class="btn btn-info btn-lg" data-bs-toggle="modal" data-bs-target="#demoModal">
        Abrir Modal
      </button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="demoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modal do Bootstrap</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Funciona só com classes e data-bs-toggle!
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JS BOOTSTRAP -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  
</body>
</html>
