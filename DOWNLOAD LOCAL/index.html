<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap - Download Local</title>
  
  <!-- CSS LOCAL -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="#">Bootstrap Local</a>
    </div>
  </nav>

  <div class="container my-5 p-4 bg-white rounded shadow">
    <h1 class="text-center mb-4">Funcionando com DOWNLOAD!</h1>
    <div class="row">
      <div class="col-md-6">
        <button class="btn btn-primary mb-2">Primary</button>
        <button class="btn btn-success mb-2">Success</button>
      </div>
      <div class="col-md-6">
        <button class="btn btn-info btn-lg" data-bs-toggle="modal" data-bs-target="#demoModal">
          Abrir Modal
        </button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="demoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modal Local</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Download funcionando!</div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JS LOCAL -->
  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
